name: Build UTM Snapshot Manager

on:
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build the app
        run: |
          xcodebuild -project "UTM Snapshot-Manager.xcodeproj" \
          -scheme "UTM Snapshot-Manager" \
          -configuration Release \
          clean build \
          CONFIGURATION_BUILD_DIR="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=""

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UTM-Snapshot-Manager-App
          path: "build/UTM Snapshot-Manager.app"